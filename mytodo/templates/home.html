<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      *{
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h3 {
            margin-top: 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #4CAF50;
            color: white;
            padding: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
        }

        .logo img {
            width: 50px;
            height: auto;
            margin-right: 10px;
        }

        .nav-links {
            display: flex;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 6px;
        }

        .login-form {
            display: flex;
        }

        .login-form input {
            padding: 5px;
            margin-right: 10px;
            border: 1px solid #ccc;
        }

        .login-form button {
            padding: 5px 10px;
            border: 1px solid #4CAF50;
            background-color: #757575;
            color: white;
            cursor: pointer;
        }

        .nav-links a:hover {
            background-color: #90ee90;
        }

        .login-form button:hover {
            background-color: #5f5959;
        }

        @media screen and (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: center;
            }

            .nav-links {
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .nav-links a {
                margin-right: 0;
                padding: 6px;
            }

            .nav-links a:hover {
                background-color: #90ee90;
            }

            .login-form button:hover {
                background-color: #5f5959;
            }

            .login-form {
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .login-form input {
                margin-right: 0;
                margin-bottom: 8px;
            }

            .nav-links,
            .login-form {
                width: 100%;
            }

            .nav-links a,
            .login-form input,
            .login-form button {
                width: 100%;
            }
        
      }
    </style>
    </head>
    
    <body>
      <a class="navbar-brand" href="#">TodoList</a>
      <a class="navbar-brand" href="{% url 'login' %}">Login</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          
      </ul>
    <style>
        .container {
            text-align: center;
            margin: 100px auto;
            max-width: 500px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: navy;
            font-weight: bold;
        }
    </style>
</head>
<body>
 

    <div class="container">
        <!-- Page heading -->
        <h1>Welcome to My TODO APP</h1>
        
        <!-- Animated GIF -->
        <!-- Use "welcome.gif" as the source for the GIF -->
        <img src="https://i.ibb.co/RNB6jpM/welcome.gif" alt="Welcome Cartoon">
    </div>
</body>
</html>
